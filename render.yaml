services:
  # ── Backend: Flask / Gunicorn ─────────────────────────────────────
  - type: web
    name: lurniq-backend
    runtime: python
    pythonVersion: "3.11.9"
    region: singapore          # closest to India; change if needed
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: MONGO_URI
        sync: false            # you will paste the value in the Render dashboard
      - key: JWT_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false            # paste your static site URL after it's created
    healthCheckPath: /api/health

  # ── Frontend: React / Vite ────────────────────────────────────────
  - type: web
    name: lurniq-frontend
    runtime: static
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false            # paste your backend URL + /api  e.g. https://lurniq-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
